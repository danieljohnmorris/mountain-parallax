<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mountain Valley</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { overflow-x: hidden; }
    body { background: #1a1a2e; color: #e0e0e0; font-family: system-ui, sans-serif; }
    canvas { position: fixed; top: 0; left: 0; z-index: 0; }
    .scroll-container { position: relative; z-index: 1; pointer-events: none; }
    .section {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .section-text {
      font-size: clamp(1.5rem, 4vw, 3rem);
      font-weight: 300;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      opacity: 0;
      transition: opacity 0.8s ease;
      text-shadow: 0 2px 20px rgba(0,0,0,0.8);
      pointer-events: auto;
    }
    .section-text.visible { opacity: 1; }
    .section-text.fade { opacity: 0.3; }
    .switcher {
      position: fixed; top: 1.2rem; right: 1.2rem; z-index: 10;
      display: flex; gap: 0; border-radius: 6px; overflow: hidden;
      background: rgba(0,0,0,0.4); backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.2);
      font-size: 0.9rem; letter-spacing: 0.06em;
    }
    .switcher a {
      padding: 0.5rem 1rem; text-decoration: none; color: rgba(255,255,255,0.5);
      transition: background 0.2s, color 0.2s; display: flex; flex-direction: column;
      align-items: center; gap: 0.15rem;
    }
    .switcher a strong { font-size: 0.9rem; font-weight: 600; }
    .switcher a span { font-size: 0.6rem; opacity: 0.7; white-space: nowrap; }
    .switcher a:hover { color: rgba(255,255,255,0.9); background: rgba(255,255,255,0.08); }
    .switcher a.active { color: #fff; background: rgba(255,255,255,0.18); }
  </style>
</head>
<body>
  <div class="switcher">
    <a href="/v1.html" class="active"><strong>v1</strong><span>Terrain + fog</span></a>
    <a href="/v2.html"><strong>v2</strong><span>Trees, water, sky</span></a>
  </div>
  <canvas id="scene"></canvas>
  <div class="scroll-container">
    <div class="section"><span class="section-text" data-at="0">Above the clouds</span></div>
    <div class="section"></div>
    <div class="section"></div>
    <div class="section"><span class="section-text" data-at="2">Through the mist</span></div>
    <div class="section"></div>
    <div class="section"></div>
    <div class="section"></div>
    <div class="section"><span class="section-text" data-at="4">Into the valley</span></div>
    <div class="section"></div>
  </div>

  <script type="importmap">
    { "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js" } }
  </script>
  <script type="module">
    import * as THREE from 'three';

    // --- Setup ---
    const canvas = document.getElementById('scene');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 0.8;

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);

    // --- Fog ---
    scene.fog = new THREE.FogExp2(0x8899aa, 0.0025);
    scene.background = new THREE.Color(0x8899aa);

    // --- Lights ---
    const ambient = new THREE.AmbientLight(0x667788, 0.6);
    scene.add(ambient);

    const sun = new THREE.DirectionalLight(0xffeedd, 1.4);
    sun.position.set(200, 300, -100);
    scene.add(sun);

    const rimLight = new THREE.DirectionalLight(0xaabbcc, 0.4);
    rimLight.position.set(-100, 50, 200);
    scene.add(rimLight);

    // --- Terrain generation ---
    function noise2d(x, z) {
      const s = Math.sin(x * 0.67 + z * 1.37) * 43758.5453;
      return s - Math.floor(s);
    }

    function fbm(x, z, octaves) {
      let val = 0, amp = 1, freq = 1, max = 0;
      for (let i = 0; i < octaves; i++) {
        // Smooth noise via bicubic-style interpolation
        const ix = Math.floor(x * freq), iz = Math.floor(z * freq);
        const fx = x * freq - ix, fz = z * freq - iz;
        const sx = fx * fx * (3 - 2 * fx), sz = fz * fz * (3 - 2 * fz);
        const a = noise2d(ix, iz), b = noise2d(ix + 1, iz);
        const c = noise2d(ix, iz + 1), d = noise2d(ix + 1, iz + 1);
        const v = a + (b - a) * sx + (c - a) * sz + (a - b - c + d) * sx * sz;
        val += v * amp;
        max += amp;
        amp *= 0.45;
        freq *= 2.1;
      }
      return val / max;
    }

    function getHeight(x, z) {
      // Large mountain shapes
      const mountains = fbm(x * 0.003, z * 0.003, 6) * 200;
      // Valley carved through the center (along z-axis)
      const valleyDist = Math.abs(x) / 80;
      const valleyFactor = Math.min(1, valleyDist * valleyDist);
      // Ridge details
      const ridges = fbm(x * 0.012 + 5.3, z * 0.012 + 2.7, 4) * 30;
      // Small rocky detail
      const detail = fbm(x * 0.05, z * 0.05, 3) * 8;
      const base = (mountains * valleyFactor + ridges + detail) - 40;
      return base;
    }

    // Build terrain mesh
    const terrainSize = 1200;
    const segments = 350;
    const geo = new THREE.PlaneGeometry(terrainSize, terrainSize, segments, segments);
    geo.rotateX(-Math.PI / 2);

    const positions = geo.attributes.position.array;
    const colors = new Float32Array(positions.length);

    for (let i = 0; i < positions.length; i += 3) {
      const x = positions[i];
      const z = positions[i + 2];
      const h = getHeight(x, z);
      positions[i + 1] = h;

      // Color by height
      let r, g, b;
      if (h < -10) {
        // Valley floor: dark green/brown
        r = 0.15 + noise2d(x * 0.1, z * 0.1) * 0.05;
        g = 0.2 + noise2d(x * 0.12, z * 0.08) * 0.06;
        b = 0.1;
      } else if (h < 30) {
        // Lower slopes: green to grey
        const t = (h + 10) / 40;
        r = 0.15 + t * 0.25;
        g = 0.25 - t * 0.05;
        b = 0.12 + t * 0.15;
      } else if (h < 80) {
        // Mid slopes: grey rock
        const t = (h - 30) / 50;
        r = 0.35 + t * 0.15;
        g = 0.32 + t * 0.13;
        b = 0.3 + t * 0.15;
      } else {
        // Peaks: light grey/snow
        const t = Math.min(1, (h - 80) / 60);
        r = 0.5 + t * 0.35;
        g = 0.5 + t * 0.35;
        b = 0.55 + t * 0.35;
      }
      colors[i] = r;
      colors[i + 1] = g;
      colors[i + 2] = b;
    }

    geo.computeVertexNormals();
    geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));

    const terrainMat = new THREE.MeshStandardMaterial({
      vertexColors: true,
      roughness: 0.9,
      metalness: 0.05,
      flatShading: false,
    });
    const terrain = new THREE.Mesh(geo, terrainMat);
    scene.add(terrain);


    // --- Camera journey (gentle forward descent) ---
    const cameraStops = [
      // High above, looking out over the range
      { pos: new THREE.Vector3(0, 200, 300), look: new THREE.Vector3(0, 40, -100) },
      // Drifting lower, approaching the ridgeline
      { pos: new THREE.Vector3(20, 110, 150), look: new THREE.Vector3(0, 30, -100) },
      // Into the fog, mid-mountain
      { pos: new THREE.Vector3(10, 40, 30), look: new THREE.Vector3(0, 15, -120) },
      // Low, following the valley floor forward
      { pos: new THREE.Vector3(5, 8, -60), look: new THREE.Vector3(0, 10, -180) },
      // Settled in the valley, looking forward
      { pos: new THREE.Vector3(0, 0, -140), look: new THREE.Vector3(0, 5, -250) },
    ];

    // --- Scroll tracking ---
    let scrollProgress = 0;
    const totalScroll = () => document.documentElement.scrollHeight - window.innerHeight;

    window.addEventListener('scroll', () => {
      scrollProgress = window.scrollY / totalScroll();
    }, { passive: true });

    // --- Text visibility ---
    const texts = document.querySelectorAll('.section-text');
    const maxSeg = cameraStops.length - 1;
    function updateTexts() {
      const seg = scrollProgress * maxSeg;
      texts.forEach(el => {
        const at = parseFloat(el.dataset.at);
        let show, fade;
        if (at === 0) {
          show = seg < 0.6;
          fade = seg >= 0.6 && seg < 1.0;
        } else if (at === maxSeg) {
          show = scrollProgress > 0.75;
          fade = scrollProgress > 0.6 && scrollProgress <= 0.75;
        } else {
          const dist = Math.abs(seg - at);
          show = dist < 0.5;
          fade = dist >= 0.5 && dist < 0.9;
        }
        el.classList.toggle('visible', show);
        el.classList.toggle('fade', fade);
      });
    }

    // --- Smooth interpolation ---
    const currentPos = new THREE.Vector3();
    const currentLook = new THREE.Vector3();
    const targetPos = new THREE.Vector3();
    const targetLook = new THREE.Vector3();

    currentPos.copy(cameraStops[0].pos);
    currentLook.copy(cameraStops[0].look);

    function getTargets(t) {
      const seg = t * (cameraStops.length - 1);
      const i = Math.min(Math.floor(seg), cameraStops.length - 2);
      const f = seg - i;
      // Smooth step for easing
      const sf = f * f * (3 - 2 * f);
      targetPos.lerpVectors(cameraStops[i].pos, cameraStops[i + 1].pos, sf);
      targetLook.lerpVectors(cameraStops[i].look, cameraStops[i + 1].look, sf);
    }

    // --- Animate ---
    const clock = new THREE.Clock();
    function animate() {
      requestAnimationFrame(animate);
      const dt = clock.getDelta();
      const time = clock.getElapsedTime();

      // Scroll-driven camera
      const clampedProgress = Math.max(0, Math.min(1, scrollProgress));
      getTargets(clampedProgress);

      // Smooth follow
      currentPos.lerp(targetPos, 1 - Math.exp(-4 * dt));
      currentLook.lerp(targetLook, 1 - Math.exp(-4 * dt));

      // Subtle breathing motion
      camera.position.copy(currentPos);
      camera.position.x += Math.sin(time * 0.3) * 1.5;
      camera.position.y += Math.sin(time * 0.2) * 0.8;
      camera.lookAt(currentLook);

      // Shift fog density with camera height
      const heightRatio = Math.max(0, Math.min(1, camera.position.y / 220));
      scene.fog.density = 0.0015 + (1 - heightRatio) * 0.004;

      updateTexts();
      renderer.render(scene, camera);
    }
    animate();

    // --- Resize ---
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
